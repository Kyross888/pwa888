<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Combat Camp Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }
        
        .mma-header {
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('icon-512.png');
            background-size: cover;
            padding: 40px 0;
            border-bottom: 3px solid #d4af37;
        }
        
        .card {
            background-color: #1a1a1a;
            border: none;
            border-radius: 15px;
        }
        
        .btn-category {
            border: 1px solid #d4af37;
            color: #d4af37;
            margin: 5px;
            transition: 0.3s;
        }
        
        .btn-category:hover {
            background-color: #d4af37;
            color: #000;
        }
        
        .btn-gold {
            background-color: #d4af37;
            color: #000;
            font-weight: bold;
            border-radius: 8px;
        }
        
        .list-group-item {
            background-color: #1a1a1a;
            color: #fff;
            border: 1px solid #333;
            margin-bottom: 5px;
            border-radius: 10px !important;
        }
        
        .badge-mma {
            background-color: #d4af37;
            color: #000;
        }
    </style>
</head>

<body>

    <div class="mma-header text-center shadow-lg">
        <h1 class="display-3 fw-black text-uppercase" style="color: #d4af37; letter-spacing: 4px;">Combat Camp</h1>
        <p class="text-white-50">FORGE THE WARRIOR</p>
    </div>

    <div class="container mt-n4">
        <div class="card p-4 shadow-lg mb-4">
            <h5 class="text-uppercase mb-3" style="color: #d4af37; font-size: 0.9rem;">Quick Add Category</h5>
            <div class="d-flex flex-wrap justify-content-center mb-4">
                <button class="btn btn-category px-4" onclick="quickAdd(' Striking')">Striking</button>
                <button class="btn btn-category px-4" onclick="quickAdd(' Grappling')">Grappling</button>
                <button class="btn btn-category px-4" onclick="quickAdd(' Sparring')">Sparring</button>
                <button class="btn btn-category px-4" onclick="quickAdd(' Cardio/S&C')">Cardio</button>
            </div>

            <div class="input-group">
                <input type="text" id="drillInput" class="form-control bg-dark text-white border-secondary" placeholder="Or type custom drill...">
                <button class="btn btn-gold px-4" type="button" onclick="addDrill()">LOG WORK</button>
            </div>
        </div>

        <h4 class="mb-3 px-2 text-uppercase" style="letter-spacing: 2px;">Training Log</h4>
        <ul class="list-group" id="logList">
        </ul>
    </div>

    <script>
        function quickAdd(type) {
            createEntry(type);
        }

        function addDrill() {
            const input = document.getElementById('drillInput');
            if (!input.value) return;
            createEntry(input.value);
            input.value = '';
        }

        function createEntry(text) {
            const list = document.getElementById('logList');
            const now = new Date();
            const time = now.getHours() + ":" + now.getMinutes().toString().padStart(2, '0');

            const li = document.createElement('li');
            li.className = "list-group-item d-flex justify-content-between align-items-center border-start border-4 border-warning";
            li.innerHTML = `
            <div>
                <span class="fw-bold">${text}</span><br>
                <small class="text-muted">${time}</small>
            </div>
            <button class="btn btn-sm btn-dark text-danger border-0" onclick="this.parentElement.remove()">✕</button>
        `;
            list.prepend(li);
        }

        // Register PWA Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js');
            });
        }
    </script>

</body>

</html>
