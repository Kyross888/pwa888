<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Student Log</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <style>
        body {
            background-color: #0d0d0d;
            color: #f8f9fa;
            font-family: 'Segoe UI', sans-serif;
        }
        
        .school-header {
            background: linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.8)), url('icon-512.png');
            padding: 50px 0;
            border-bottom: 4px solid #ff6600;
        }
        
        .card {
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
        }
        
        .btn-category {
            border: 1px solid #ff6600;
            color: #ff6600;
            margin: 5px;
            font-weight: 600;
        }
        
        .btn-category:hover {
            background-color: #ff6600;
            color: #000;
        }
        
        .btn-forge {
            background-color: #ff6600;
            color: #000;
            font-weight: bold;
            border-radius: 8px;
        }
        
        .list-group-item {
            background-color: #1a1a1a;
            color: #fff;
            border: 1px solid #333;
            border-left: 5px solid #ff6600 !important;
            margin-bottom: 8px;
            border-radius: 8px !important;
        }
    </style>
</head>

<body>
    <div class="school-header text-center shadow-lg">
        <h1 class="display-4 fw-bold" style="color: #ff6600; letter-spacing: 3px;">To-Do List</h1>
        <p class="text-white-50 text-uppercase small">Academic Success</p>
    </div>
    <div class="container mt-4">
        <div class="card p-4 shadow-lg mb-4">
            <h6 class="text-uppercase text-muted mb-3">TASK</h6>
            <div class="d-flex flex-wrap justify-content-center mb-4">
                <button class="btn btn-category px-4" onclick="quickAdd('Study')">Study</button>
                <button class="btn btn-category px-4" onclick="quickAdd('Research')">Research</button>
                <button class="btn btn-category px-4" onclick="quickAdd('Assignment')">Assignment</button>
                <button class="btn btn-category px-4" onclick="quickAdd('Project')">Project</button>
            </div>

            <div class="input-group">
                <input type="text" id="taskInput" class="form-control bg-dark text-white border-secondary" placeholder="Or type custom goal...">
                <button class="btn btn-forge px-4" type="button" onclick="addTask()">ADD</button>
            </div>
        </div>
        <h5 class="text-uppercase small text-muted mb-3">Daily Progress Log</h5>
        <ul class="list-group" id="logList"></ul>
    </div>
    <script>
        function quickAdd(type) {
            createEntry(type);
        }

        function addTask() {
            const input = document.getElementById('taskInput');
            if (!input.value) return;
            createEntry(input.value);
            input.value = '';
        }

        function createEntry(text) {
            const list = document.getElementById('logList');
            const time = new Date().toLocaleTimeString([], {
                hour: '2-digit',
                minute: '2-digit'
            });
            const li = document.createElement('li');
            li.className = "list-group-item d-flex justify-content-between align-items-center";
            li.innerHTML = `<div><span class="fw-bold">${text}</span><br><small class="text-muted">${time}</small></div>
                            <button class="btn btn-sm btn-dark text-danger border-0" onclick="this.parentElement.remove()">✕</button>`;
            list.prepend(li);
        }
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js');
            });
        }
    </script>
</body>

</html>
